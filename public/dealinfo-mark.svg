<svg width="92" height="92" viewBox="0 0 92 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DealInfo probability pulse mark</title>
  <desc id="desc">A rounded D monogram with a rising probability pulse line.</desc>
  <defs>
    <linearGradient id="dealinfo-pulse-gradient" x1="14" y1="78" x2="78" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.48" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#D946EF"/>
    </linearGradient>
    <radialGradient id="dealinfo-surface-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(70 16) rotate(125) scale(74)">
      <stop stop-color="#38BDF8" stop-opacity="0.5"/>
      <stop offset="0.46" stop-color="#07111F" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0"/>
    </radialGradient>
    <filter id="dealinfo-pulse-glow" x="16" y="26" width="60" height="36" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="76" height="76" rx="20" fill="#07111F"/>
  <rect x="8" y="8" width="76" height="76" rx="20" fill="url(#dealinfo-surface-glow)"/>
  <rect x="9.5" y="9.5" width="73" height="73" rx="18.5" stroke="url(#dealinfo-pulse-gradient)" stroke-width="3"/>
  <path d="M30 25H46.5C58.9 25 67 33.1 67 46C67 58.9 58.9 67 46.5 67H30V25Z" stroke="#E9FBFF" stroke-width="8" stroke-linejoin="round"/>
  <path d="M26 54L36.5 43.5L44.5 51.5L57.5 35.5L67 44.5" stroke="url(#dealinfo-pulse-gradient)" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#dealinfo-pulse-glow)"/>
  <circle cx="67" cy="44.5" r="4.2" fill="#22C55E"/>
  <circle cx="67" cy="44.5" r="7.2" stroke="#22C55E" stroke-opacity="0.26" stroke-width="2"/>
</svg>
